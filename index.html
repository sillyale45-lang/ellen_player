<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NOM NOM SHARK PLAYER - Panel Derecho</title>
<style>
/* panel lateral derecho */
#ellen-panel {
  position: fixed;
  top: 50px;           /* posición inicial vertical */
  right: -360px;       /* fuera de la pantalla al inicio */
  width: 350px;
  height: 500px;
  z-index: 999999;
  background: rgba(8,8,12,0.95);
  border-left: 3px solid #9e213c;
  border-radius: 10px 0 0 10px;
  box-shadow: -2px 0 15px rgba(0,0,0,0.5);
  transition: right 0.35s ease;
  pointer-events: auto;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* iframe del reproductor */
#ellen-panel iframe {
  width: 100%;
  height: 100%;
  border: none;
  background: transparent;
}

/* botón toggle */
#ellen-toggle {
  position: fixed;
  top: 50px;
  right: 0px;
  z-index: 1000000;
  cursor: pointer;
  font-size: 26px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 3px solid #A0C4FF;
  background: #9e213c;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 15px rgba(0,0,0,0.6);
  transition: transform 0.2s;
}

#ellen-toggle:hover {
  transform: scale(1.1);
}

/* sombra interna bonita para el panel */
#ellen-panel::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 6px;
  height: 100%;
  background: linear-gradient(to bottom, #ffdf00, #A0C4FF);
  border-radius: 6px 0 0 6px;
}
</style>
</head>
<body>

<!-- panel lateral -->
<div id="ellen-panel">
  <iframe src="https://sillyale45-lang.github.io/ellen_player/" allow="autoplay"></iframe>
</div>

<!-- botón toggle -->
<div id="ellen-toggle">🦈</div>

<script>
// referencias
const panel = document.getElementById("ellen-panel");
const toggle = document.getElementById("ellen-toggle");

// abrir/cerrar panel
toggle.onclick = () => {
  if(panel.style.right === "0px"){
    panel.style.right = "-360px"; // cerrar
  } else {
    panel.style.right = "0px";    // abrir
  }
};

// mover verticalmente
let dragging = false, offsetY = 0;
toggle.addEventListener("mousedown", e => {
  dragging = true;
  offsetY = e.clientY - panel.offsetTop;
});
document.addEventListener("mousemove", e => {
  if(!dragging) return;
  let newTop = e.clientY - offsetY;
  newTop = Math.max(0, Math.min(window.innerHeight - panel.offsetHeight, newTop)); // no sale de la ventana
  panel.style.top = newTop + "px";
  toggle.style.top = newTop + "px";
});
document.addEventListener("mouseup", () => { dragging = false; });
</script>

</body>
</html>
