<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NOM NOM SHARK PLAYER - Panel Derecho</title>

<style>
/* panel lateral derecho */
#ellen-panel {
  position: fixed;
  top: 50px;           
  right: -360px;       /* fuera de la pantalla al inicio */
  width: 350px;
  height: 500px;
  z-index: 999999;
  background: rgba(8,8,12,0.95);
  border-left: 3px solid #9e213c;
  border-radius: 10px 0 0 10px;
  box-shadow: -2px 0 15px rgba(0,0,0,0.5);
  transition: right 0.35s ease;
  pointer-events: auto;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 10px;
}

/* botón toggle */
#ellen-toggle {
  position: fixed;
  top: 50px;
  right: 0px;
  z-index: 1000000;
  cursor: pointer;
  font-size: 26px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 3px solid #A0C4FF;
  background: #9e213c;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 15px rgba(0,0,0,0.6);
  transition: transform 0.2s;
}
#ellen-toggle:hover { transform: scale(1.1); }

/* buscador */
.row {
  display:flex;
  gap:6px;
  margin-bottom:10px;
}
.row input {
  flex:1;
  background:#111;
  border:1px solid #9e213c;
  color:white;
  padding:8px;
  outline:none;
  border-radius:6px;
}
.row button {
  background:#9e213c;
  border:none;
  color:white;
  padding:0 12px;
  cursor:pointer;
  border-radius:6px;
}

/* títulos y playlist */
#ellen-title{
  font-size:12px;
  color:#A0C4FF;
  margin-bottom:6px;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}
#playlist{
  margin-top:10px;
  font-size:11px;
  border-top:1px solid #9e213c;
  padding-top:6px;
}
.track{
  padding:4px 0;
  cursor:pointer;
}
.track:hover{color:#A0C4FF;}
.track.active{color:#ffdf00;}

/* play y controles */
#ellen-play{
  width:60px;
  height:45px;
  border-radius:10px;
  border:2px solid #9e213c;
  background:#111;
  color:white;
  font-size:20px;
  cursor:pointer;
  margin-bottom:6px;
}
#ellen-progress{
  width:100%;
  height:6px;
  accent-color:#A0C4FF;
  background:#222;
  border-radius:4px;
  margin-bottom:6px;
}
#ellen-vol{
  width:100%;
  accent-color:#9e213c;
  margin-top:6px;
}

/* YouTube player oculto */
#ellen-player {
  width:0;
  height:0;
}
</style>
</head>
<body>

<!-- botón toggle -->
<div id="ellen-toggle">🦈</div>

<!-- panel lateral derecho -->
<div id="ellen-panel">

  <div class="row">
    <input id="ellen-search" placeholder="Buscar canción...">
    <button id="ellen-go">🔍</button>
  </div>

  <div id="ellen-title">Ninguna canción</div>

  <button id="ellen-play">▶</button>

  <input type="range" id="ellen-progress" min="0" max="100" value="0">
  <input type="range" id="ellen-vol" min="0" max="1" step="0.05" value="0.5">

  <div id="playlist"></div>

  <div id="ellen-player"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const panel=document.getElementById("ellen-panel");
const toggle=document.getElementById("ellen-toggle");
const input=document.getElementById("ellen-search");
const go=document.getElementById("ellen-go");
const play=document.getElementById("ellen-play");
const vol=document.getElementById("ellen-vol");
const progress=document.getElementById("ellen-progress");
const title=document.getElementById("ellen-title");
const playlistDiv=document.getElementById("playlist");
let ytPlayer, playlist=[], currentIndex=-1, playing=false, progressUpdater;

// toggle panel
toggle.onclick=()=>{
  if(panel.style.right==="0px"){
    panel.style.right="-360px";
  } else {
    panel.style.right="0px";
  }
};

// draggable vertical
let dragging=false, offsetY=0;
toggle.addEventListener("mousedown", e=>{
  dragging=true;
  offsetY=e.clientY-panel.offsetTop;
});
document.addEventListener("mousemove", e=>{
  if(!dragging) return;
  let newTop=e.clientY-offsetY;
  newTop=Math.max(0,Math.min(window.innerHeight-panel.offsetHeight,newTop));
  panel.style.top=newTop+"px";
  toggle.style.top=newTop+"px";
});
document.addEventListener("mouseup", ()=>dragging=false);

// YouTube API
function onYouTubeIframeAPIReady(){
  ytPlayer=new YT.Player("ellen-player",{
    height:"0", width:"0",
    playerVars:{autoplay:1,controls:0,modestbranding:1},
    events:{onStateChange:onPlayerStateChange}
  });
}

// playlist
function renderPlaylist(){
  playlistDiv.innerHTML="";
  playlist.forEach((t,i)=>{
    const div=document.createElement("div");
    div.className="track"+(i===currentIndex?" active":"");
    div.innerText=t.titulo;
    div.onclick=()=>{ currentIndex=i; reproducirActual(); };
    playlistDiv.appendChild(div);
  });
}

// reproducir
function reproducirActual(){
  if(currentIndex<0) return;
  const vid=playlist[currentIndex];
  title.innerText=vid.titulo;
  ytPlayer.loadVideoById(vid.id);
  playing=true;
  play.innerText="⏸";
  renderPlaylist();
  startProgressUpdater();
}

// terminar
function onPlayerStateChange(e){
  if(e.data===YT.PlayerState.ENDED){
    playing=false;
    play.innerText="▶";
    resetProgress();
  }
}

// play/pause
play.onclick=()=>{
  if(!ytPlayer) return;
  const estado=ytPlayer.getPlayerState();
  if(estado===YT.PlayerState.PLAYING){
    ytPlayer.pauseVideo();
    playing=false;
    play.innerText="▶";
  } else {
    if(currentIndex===-1 && playlist.length) currentIndex=0;
    reproducirActual();
  }
};

// volumen
vol.oninput=e=>{
  if(ytPlayer) ytPlayer.setVolume(e.target.value*100);
};

// barra
progress.oninput=e=>{
  if(ytPlayer && ytPlayer.getDuration()){
    const t=(e.target.value/100)*ytPlayer.getDuration();
    ytPlayer.seekTo(t,true);
  }
};

function startProgressUpdater(){
  clearInterval(progressUpdater);
  progressUpdater=setInterval(()=>{
    if(ytPlayer && ytPlayer.getDuration()){
      progress.value=(ytPlayer.getCurrentTime()/ytPlayer.getDuration())*100;
    }
  },500);
}

function resetProgress(){
  progress.value=0;
  clearInterval(progressUpdater);
}

// buscar + autoplay
go.onclick=()=>buscar(input.value);
input.onkeypress=e=>{ if(e.key==="Enter") buscar(input.value); };

function buscar(q){
  if(!q) return;
  title.innerText="Buscando...";
  fetch("https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=1&q="+encodeURIComponent(q)+"&key=AIzaSyDIAfpLJ3GqYpBDUfvCSWaXox8iSw0_R1w")
  .then(r=>r.json())
  .then(data=>{
    if(!data.items?.length){ title.innerText="No encontrado"; return; }
    const v=data.items[0];
    playlist.push({id:v.id.videoId,titulo:v.snippet.title});
    currentIndex=playlist.length-1;
    reproducirActual();
  });
}
</script>
</body>
</html>
