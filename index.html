<div id="ellen-panel">
  <iframe src="https://sillyale45-lang.github.io/ellen_player/" frameborder="0" allow="autoplay"></iframe>
</div>
<button id="ellen-toggle">🦈</button>

<style>
#ellen-panel {
  position: fixed;
  top: 0;
  right: -350px; /* fuera de la pantalla */
  width: 350px;
  height: 100vh;
  z-index: 999999;
  transition: right 0.3s ease;
  pointer-events: auto; /* solo el panel captura eventos */
}

#ellen-panel iframe {
  width: 100%;
  height: 100%;
  border: none;
}

#ellen-toggle {
  position: fixed;
  top: 50px;
  right: 10px;
  z-index: 1000000;
  cursor: pointer;
  font-size: 24px;
}
</style>

<script>
const panel = document.getElementById("ellen-panel");
const toggle = document.getElementById("ellen-toggle");

toggle.onclick = () => {
  if(panel.style.right === "0px"){
    panel.style.right = "-350px"; // cerrar
  } else {
    panel.style.right = "0px";    // abrir
  }
};
</script>
