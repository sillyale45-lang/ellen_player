<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NOM NOM SHARK PLAYER - Pestaña Lateral</title>

<style>
/* Panel lateral derecho */
#ellen-panel {
  position: fixed;
  top: 50px;
  right: -360px;        /* inicia cerrado */
  width: 350px;
  height: 500px;
  z-index: 999999;
  background: rgba(8,8,12,0.95);
  border-left: 3px solid #9e213c;
  border-radius: 10px 0 0 10px;
  box-shadow: -2px 0 15px rgba(0,0,0,0.5);
  transition: right 0.35s ease;
  pointer-events: auto;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 10px;
}

/* Pestaña lateral */
#ellen-tab {
  position: fixed;
  top: 50px;
  right: 0px;
  width: 50px;
  height: 100px;
  background: #9e213c;
  color: white;
  font-size: 26px;
  border-radius: 10px 0 0 10px;
  border: 3px solid #A0C4FF;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 1000000;
  box-shadow: 0 0 15px rgba(0,0,0,0.6);
  writing-mode: vertical-rl;
  text-orientation: mixed;
}

/* buscador */
.row { display:flex; gap:6px; margin-bottom:10px; }
.row input { flex:1; background:#111; border:1px solid #9e213c; color:white; padding:8px; outline:none; border-radius:6px; }
.row button { background:#9e213c; border:none; color:white; padding:0 12px; cursor:pointer; border-radius:6px; }

/* títulos y playlist */
#ellen-title{ font-size:12px; color:#A0C4FF; margin-bottom:6px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
#playlist{ margin-top:10px; font-size:11px; border-top:1px solid #9e213c; padding-top:6px; }
.track{ padding:4px 0; cursor:pointer; }
.track:hover{color:#A0C4FF;}
.track.active{color:#ffdf00;}

/* play y controles */
#ellen-play{ width:60px; height:45px; border-radius:10px; border:2px solid #9e213c; background:#111; color:white; font-size:20px; cursor:pointer; margin-bottom:6px; }
#ellen-progress{ width:100%; height:6px; accent-color:#A0C4FF; background:#222; border-radius:4px; margin-bottom:6px; }
#ellen-vol{ width:100%; accent-color:#9e213c; margin-top:6px; }

/* YouTube player oculto */
#ellen-player { width:0; height:0; }
</style>
</head>
<body>

<!-- pestaña lateral -->
<div id="ellen-tab">🦈</div>

<!-- panel lateral -->
<div id="ellen-panel">

  <div class="row">
    <input id="ellen-search" placeholder="Buscar canción...">
    <button id="ellen-go">🔍</button>
  </div>

  <div id="ellen-title">Ninguna canción</div>

  <button id="ellen-play">▶</button>

  <input type="range" id="ellen-progress" min="0" max="100" value="0">
  <input type="range" id="ellen-vol" min="0" max="1" step="0.05" value="0.5">

  <div id="playlist"></div>

  <div id="ellen-player"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// abrir/cerrar panel
const panel=document.getElementById("ellen-panel");
const tab=document.getElementById("ellen-tab");
tab.onclick=()=>{ panel.style.right = (panel.style.right==="0px") ? "-360px" : "0px"; };

// draggable vertical
let dragging=false, offsetY=0;
tab.addEventListener("mousedown", e=>{
  dragging=true; offsetY=e.clientY-panel.offsetTop;
});
document.addEventListener("mousemove", e=>{
  if(!dragging) return;
  let newTop=e.clientY-offsetY;
  newTop=Math.max(0, Math.min(window.innerHeight-panel.offsetHeight, newTop));
  panel.style.top=newTop+"px";
  tab.style.top=newTop+"px";
});
document.addEventListener("mouseup", ()=>dragging=false);

// Aquí va TODO tu JS de búsqueda, playlist y reproducción
// (el que ya tienes funcionando en tu HTML original)
</script>
</body>
</html>
