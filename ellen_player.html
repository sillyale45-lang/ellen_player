<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ellen Joe YouTube Player</title>
<style>
body { background:#0a0a0c; color:white; font-family:Segoe UI; padding:20px; }
#ellen-ui { width:260px; background:#08080c; border:2px solid #9e213c; border-radius:12px; padding:14px; }
input { width:100%; padding:8px; background:#111; border:1px solid #9e213c; color:white; }
button { background:#9e213c; border:none; color:white; padding:8px; width:100%; cursor:pointer; }
#title { font-size:12px; color:#A0C4FF; margin:10px 0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
</style>
</head>
<body>

<div id="ellen-ui">
<input id="search" placeholder="Buscar canción...">
<button id="go">🔍 Buscar</button>
<div id="title">Título</div>
<iframe id="player" width="0" height="0" allow="autoplay" src=""></iframe>
</div>

<script>
const input = document.getElementById("search");
const go = document.getElementById("go");
const player = document.getElementById("player");
const title = document.getElementById("title");

// Función para reproducir un videoId de YouTube solo audio
function reproducir(videoId, nombre){
    title.innerText = nombre;
    player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=0&modestbranding=1`;
}

// Función para "buscar" (demo con videoId fijo)
function buscar(q){
    title.innerText = "Buscando...";
    // Demo: hardcodeamos un videoId para que suene
    let videoId = "kXYiU_JCYtU"; // Numb - Linkin Park
    reproducir(videoId, q);
}

go.onclick = () => buscar(input.value);
input.onkeypress = e => { if(e.key==="Enter") buscar(input.value); };

// Recibir búsqueda desde Haxball
window.addEventListener("message", e=>{
    if(e.data.type==="buscar" && e.data.q){
        input.value = e.data.q;
        buscar(e.data.q);
    }
});
</script>

</body>
</html>
